ecosystem: "JuGloW Global System"
root_repository: "https://github.com/JuGloW/JGS"
domain: "juglow.my.id"
dns_provider: "Cloudflare"

packages:
  - id: "haijun"
    name: "Haijun"
    type: "ai-agent"
    status: "planned-separate-repository"
    repository_target: "https://github.com/JuGloW/haijun"
    local_workspace: "D:/JuGloW/haijun"
    server_root: "/workspace/haijun-ai/server-package"
    notes: "Private AI developer agent and server package. Not bundled into JGS root."

  - id: "haicode"
    name: "Haicode"
    type: "language-family-root"
    status: "planned-separate-repository"
    repository_target: "https://github.com/JuGloW/haicode"
    notes: "Root for hai* language family packages."

  - id: "haic"
    name: "haic"
    type: "language-family-member"
    status: "planned"
    repository_target: "https://github.com/JuGloW/haic"
    notes: "C and Unix/Linux bridge inside Haicode."

  - id: "jch"
    name: "JCH"
    type: "compiler-toolchain"
    status: "planned-separate-repository"
    repository_target: "https://github.com/JuGloW/jch"
    notes: "Compiler/toolchain package."

  - id: "hcb-abi"
    name: "HCB ABI"
    type: "abi-spec"
    status: "planned-separate-repository"
    repository_target: "https://github.com/JuGloW/hcb-abi"
    notes: "Binary interface and compatibility specification."

  - id: "jurox"
    name: "JUROX OS"
    type: "operating-system"
    status: "planned-separate-repository"
    repository_target: "https://github.com/JuGloW/jurox"
    notes: "OS/runtime direction centered on Haicode."

  - id: "jdb"
    name: "JDB"
    type: "debugger"
    status: "planned"
    repository_target: "https://github.com/JuGloW/jdb"
    notes: "Debugger direction for Haicode/JCH/HCB, analogous to GDB role."

future_packages:
  jurofile: "Project file format and build metadata standard for JUROX/JGS packages."
  executable: "Executable format and runtime execution rules for JGS/JUROX packages."
  executtools: "Tool collection for executable package workflows in the JGS ecosystem."
  executconf: "Configuration system for executable and build workflows."
  executreconf: "Reconfiguration tool for executable/Jurofile based projects."
  executjuro: "Execution bridge between executable tooling and JUROX runtime workflows."
  executheader: "Header generation and metadata support for executable packages."
  executrm4te: "RM4TE execution and macro-processing support tools."
  executescan: "Scanner for executable project structure, metadata, and validation."
  executtest: "Test runner and validation framework for executable/JGS packages."
  executupdate: "Update manager for executable package metadata and generated files."
  manhelp: "Manual/help documentation system for JGS command-line tools."
  pacinfo: "Package information reader for JGS package metadata."
  paclive: "Live package workflow helper for JGS package operations."
  pac: "Core package command system for JGS."
  paci: "Package install interface for JGS package workflows."
  juroinfo: "JUROX system and package information command."
  toolchain: "Shared toolchain coordination package for JGS components."
  manpage: "Manual page source and generation system for JGS tools."
  ntz: "NTZ utility package for JGS runtime/tooling experiments."
  hai: "Root coordination package for the hai* language family."

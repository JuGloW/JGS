roles:
  core_developer_brain:
    purpose: "JGS coding, architecture, debugging, repair planning"
    candidate_families:
      - "Qwen3-Coder-Next"
      - "Qwen Coder family"
      - "DeepSeek-Coder family"
    required_tests:
      - "JGS code repair"
      - "Haicode/JCH/HCB explanation"
      - "multi-file debugging"
      - "CLI patch planning"

  agentic_cli:
    purpose: "Terminal workflows, tool use, long task loops, error recovery"
    candidate_families:
      - "Qwen3-Coder-Next"
      - "agentic code models with executable-environment training"
    required_tests:
      - "command planning"
      - "safe execution boundaries"
      - "error recovery"
      - "no destructive action without approval"

  reasoning_architecture:
    purpose: "Compiler, ABI, OS, JUROX architecture reasoning"
    candidate_families:
      - "open reasoning models"
      - "Qwen reasoning family"
      - "DeepSeek reasoning family"
    required_tests:
      - "OS design tradeoff"
      - "compiler pipeline reasoning"
      - "ABI compatibility analysis"

  security_guardian:
    purpose: "Secrets, risky code, infra posture, policy enforcement"
    candidate_families:
      - "security-tuned code model"
      - "general code model plus deterministic scanners"
    required_tests:
      - "secret detection"
      - "unsafe command refusal"
      - "public/private data classification"

  retrieval_embedding:
    purpose: "JGS source, docs, logs, and memory retrieval"
    candidate_families:
      - "text embedding model"
      - "code embedding model"
    required_tests:
      - "source search relevance"
      - "Indonesian/English technical retrieval"
      - "long project memory lookup"

  multimodal_perception:
    purpose: "Image, audio, video, screenshots, diagrams, document understanding"
    candidate_families:
      - "Qwen Omni family"
      - "Llama multimodal family"
      - "Whisper for speech recognition"
      - "CLIP-like vision embedding"
    required_tests:
      - "screenshot explanation"
      - "diagram understanding"
      - "speech transcription"
      - "video/audio note extraction"

  lightweight_client:
    purpose: "Small optional runtime for PC/laptop/phone clients"
    candidate_families:
      - "Qwen2.5 1.5B Instruct"
      - "Phi-3.5 Mini 3.8B"
      - "Qwen 2.5 7B Instruct"
      - "Mistral 7B Instruct v0.3"
    required_tests:
      - "offline summary"
      - "approval UI assistant"
      - "basic JGS Q&A"
      - "does not override Haijun security policy"

  portable_runtime_reference:
    purpose: "USB/SSD/HDD runtime architecture reference"
    candidate_families:
      - "PortableLM"
      - "Portable-AI-USB"
      - "Ollama"
      - "AnythingLLM"
      - "llama.cpp compatible GGUF runtime"
    required_tests:
      - "runs from portable storage"
      - "keeps data local"
      - "model download goes to target drive or server only"
      - "no unsafe default prompt policy"

selection_rules:
  - "One model must justify one role."
  - "Do not keep duplicate specialists unless evaluation proves different strengths."
  - "Prefer server-side models for heavy work."
  - "Keep local devices as clients unless explicitly approved."
  - "Check license, VRAM, context length, tool support, and security behavior."
  - "Promote models only after JGS-specific evaluation."
  - "Do not use uncensored/aggressive prompts as Haijun's default policy."

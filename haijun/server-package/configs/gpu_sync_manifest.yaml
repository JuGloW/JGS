name: "haijun_gpu_sync_manifest_v0"
policy: "sync_small_control_training_and_reference_files_only"

include:
  - "configs/"
  - "data/curated/"
  - "data/eval/"
  - "datasets/"
  - "docs/"
  - "memory/"
  - "references/"
  - "remote/"
  - "scripts/"
  - "src/"
  - "README.md"
  - "pyproject.toml"
  - "requirements-gpu.txt"

exclude:
  - ".venv/"
  - "models/"
  - "adapters/"
  - "runs/"
  - "data/raw/"
  - ".env"
  - ".env.*"
  - "*.gguf"
  - "*.safetensors"
  - "*.bin"
  - "*.pt"
  - "*.pth"
  - "*.onnx"
  - "*.zip"
  - "*.rar"
  - "*.7z"
  - "*.tar"
  - "*.gz"
  - "*.xz"

max_file_size_mb: 5

allowed_large_reference_files:
  - "references/copied-key-files/haicode_data_instruction_set.txt"
  - "references/copied-key-files/syscalls.master"
  - "references/portable-ai/PortableLM_chat_server.py"

server_only:
  - "model downloads"
  - "python gpu environment"
  - "torch cuda stack"
  - "bitsandbytes"
  - "training checkpoints"
  - "portable ai installation"
  - "ollama/anythingllm runtime installation"


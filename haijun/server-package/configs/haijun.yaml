project:
  name: Haijun
  mission: "Private autonomous AI developer agent for the JuGloW JGS ecosystem"
  default_language: "id"
  workspace_root_hint: "D:/github AI"
  ecosystem: "JuGloW JGS"
  juglow_meaning: "Junaidi Global Website"
  jgs_meaning: "JuGloW Global System"
  github_owner: "JuGloW"
  github_repo: "JuGloW/JGS"
  github_url: "https://github.com/JuGloW/JGS"
  local_policy: "control_only_no_model_downloads"

technical_worldview:
  language_center: "Haicode"
  language_family: "hai*"
  primary_foundation_family: "haic*"
  conversion_intelligence: "Converhai"
  language_convergence_rule: "all programming languages are studied and mapped into the hai* family inside Haicode"
  purity_rule: "preserve original program behavior while converting syntax, extension, and identity into Haicode/hai* form"
  compiler: "JCH"
  abi: "HCB"
  future_os: "JUROX OS"
  converhai_targets:
    - "applications"
    - "programs"
    - "libraries"
    - "IDEs"
    - "tools"
    - "operating_system_components"
    - "repository_source_trees"
  conversion_validation:
    - "parse_source_language"
    - "build_intermediate_representation"
    - "map_syntax_semantics_to_haicode"
    - "preserve_behavior"
    - "compile_with_jch"
    - "validate_hcb_abi"
    - "run_tests_and_differential_checks"
  os_reference_knowledge:
    - "Unix"
    - "Linux"
    - "kernel_architecture"
    - "process_memory_filesystem_io_networking_security"
  jurox_forms:
    - "permanent_os_installation"
    - "application_runtime_on_existing_platforms"
    - "portable_usb_ssd_hdd_external_runtime"
  target_platforms:
    - "computer"
    - "phone"
    - "smartwatch"
    - "television"
    - "embedded_electronics"
    - "future_devices"

identity:
  creator_owner: "JuGloW"
  owner_github: "https://github.com/JuGloW"
  trust_anchor: "owner_identity_required"
  role:
    - "private_ai_developer"
    - "jgs_maintainer_agent"
    - "security_assistant"
    - "codex_partner_memory_agent"
  loyalty_rule: "protect_owner_jgs_and_confidential_company_data"

autonomy:
  default_level: 2
  max_level_without_owner_approval: 3
  levels:
    0: "disabled"
    1: "observe_summarize"
    2: "diagnose_recommend"
    3: "prepare_patch_and_tests"
    4: "run_approved_workflows"
    5: "maintain_approved_modules"
  always_require_approval:
    - "delete_or_overwrite_user_data"
    - "publish_to_public_repository"
    - "change_security_policy"
    - "access_or_export_secrets"
    - "start_paid_gpu_resource"
    - "merge_or_release_production_code"

security:
  secrets_policy: "never_commit_never_train_on_secrets"
  private_data_policy: "classify_before_use"
  owner_identity_store: "memory/owner_profile.example.yaml"
  audit_log_required: true
  allowed_secret_locations:
    - "external_password_manager"
    - "server_environment_variables"
    - "local_user_ssh_config_outside_repo"

training:
  method: "qlora"
  dataset_path: "datasets/haijun_sft.jsonl"
  output_dir: "runs/haijun-sft"
  max_seq_length: 4096
  num_train_epochs: 2
  learning_rate: 0.0002
  warmup_ratio: 0.03
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  save_steps: 100
  eval_steps: 100
  logging_steps: 10
  seed: 3407

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

remote:
  host: ""
  user: ""
  port: 22
  remote_root: "~/haijun-ai/server-package"
  ssh_key_path: ""
  dns_name: "juglow.my.id"
  dns_provider: "Cloudflare"
  domain_registrar: "DomaiNesia"
  reserved_dns:
    root: "juglow.my.id"
    jgs: "jgs.juglow.my.id"
    haijun: "haijun.juglow.my.id"
    api: "api.juglow.my.id"
    gpu: "gpu.juglow.my.id"
    storage: "storage.juglow.my.id"
  keepalive_seconds: 30
  gpu_max_hours: 4
  install_location: "server_only"
  model_storage: "remote_server_only"
  provider_profiles:
    runpod:
      template: "Runpod Pytorch 2.8.0"
      image: "runpod/pytorch:1.0.2-cu1281-torch280-ubuntu2404"
      gpu: "RTX A5000"
      gpu_count: 1
      pricing: "on_demand"
      container_disk_gb: 30
      persistent_storage_gb: 50
      persistent_root: "/workspace"
      remote_root: "/workspace/haijun-ai/server-package"
      ssh_key_hint: "~/.ssh/haijun_runpod"
      first_run_command: "bash remote/server/first_run_server.sh"
